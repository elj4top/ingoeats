services:
  ingoeats_api:
    build: .
    container_name: ingoeats_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    # volumes:
    #   - .:/code/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      ingoeats_postgres:
        condition: service_healthy
      # ingoeats_redis:
      #   condition: service_started
    networks:
      - ingoeats_net

  ingoeats_postgres:
    image: postgres:16-alpine
    container_name: ingoeats_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - "5433:5432"
    volumes:
      - ingoeats_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ingoeats_net

  # ingoeats_redis:
  #   image: redis:7-alpine
  #   container_name: ingoeats_redis
  #   restart: unless-stopped
  #   networks:
  #     - ingoeats_net

volumes:
  ingoeats_pg_data:

networks:
  ingoeats_net: